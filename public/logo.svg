<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#059669" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="28" fill="#ffffff" />
  <!-- Medical cross — green gradient -->
  <g filter="url(#shadow)">
    <rect x="48" y="24" width="24" height="72" rx="6" fill="url(#grad1)" />
    <rect x="24" y="48" width="72" height="24" rx="6" fill="url(#grad1)" />
  </g>
  <!-- Blue accent circle -->
  <circle cx="80" cy="40" r="10" fill="url(#grad2)" opacity="0.9" />
</svg>
